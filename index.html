<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revathy & Suriya | Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root {
  --gold: #b8966a;
  --gold-light: #d4b48a;
  --gold-dim: rgba(184,150,106,0.35);
  --purple-deep: #3d1f5e;
  --purple-mid: #6b3fa0;
  --purple-light: #9b6fd0;
  --cream: #faf6f0;
  --cream-dim: rgba(250,246,240,0.85);
  --bg-paper: #fdfaf6;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Cormorant Garamond', serif;
  background: var(--bg-paper);
  overflow-x: hidden;
  color: #3a2a1a;
}

/* ===== LANDING ===== */
#landing {
  position: fixed; inset: 0; z-index: 200;
  overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 1.4s cubic-bezier(.4,0,.2,1), visibility 1.4s;
  background: #fdfaf6;
}
#landing.away { opacity: 0; visibility: hidden; pointer-events: none; }

/* Watercolor background blobs */
.wc-blob {
  position: absolute; border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
  filter: blur(55px); opacity: 0.22; pointer-events: none;
}
.wc-blob.b1 { width: 520px; height: 420px; background: #9b6fd0; top: -80px; left: -120px; }
.wc-blob.b2 { width: 380px; height: 340px; background: #6b3fa0; top: 20px; right: -80px; opacity: 0.14; }
.wc-blob.b3 { width: 480px; height: 380px; background: #c9a0e0; bottom: -60px; right: -100px; opacity: 0.18; }
.wc-blob.b4 { width: 350px; height: 300px; background: #b8c8e8; bottom: -40px; left: -60px; opacity: 0.15; }
.wc-blob.b5 { width: 280px; height: 250px; background: #e8c0d8; top: 40%; left: 30%; opacity: 0.12; }

/* Gold speckles */
.speckles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.speck {
  position: absolute; border-radius: 50%;
  background: var(--gold); opacity: 0;
  animation: speckGlow 3s ease-in-out infinite;
}
@keyframes speckGlow {
  0%,100%{opacity:0;transform:scale(0.5);}
  50%{opacity:0.7;transform:scale(1);}
}

/* Floral corners */
.floral-corner {
  position: absolute; width: 220px; height: 220px;
  pointer-events: none; opacity: 0.75;
}
.floral-corner.tl { top: 0; left: 0; }
.floral-corner.tr { top: 0; right: 0; transform: scaleX(-1); }
.floral-corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
.floral-corner.br { bottom: 0; right: 0; transform: scale(-1,-1); }

/* Gold border frame */
.gold-frame {
  position: absolute; inset: 18px;
  border: 1.5px solid var(--gold-dim);
  pointer-events: none;
}
.gold-frame::before, .gold-frame::after {
  content: ''; position: absolute;
  width: 40px; height: 40px; border-color: var(--gold); border-style: solid;
}
.gold-frame::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
.gold-frame::after { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }

/* Landing content */
.land-content {
  position: relative; z-index: 2;
  text-align: center; padding: 2rem;
  animation: fadeUp 1s ease 0.3s both;
}
.land-tag {
  font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 7px;
  color: var(--purple-mid); text-transform: uppercase; margin-bottom: 1.4rem;
}
.land-names {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(4rem, 14vw, 8rem);
  color: var(--purple-deep); line-height: 0.95;
}
.land-amp {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2.5rem, 7vw, 4rem);
  color: var(--gold); display: block; margin: 0.2rem 0;
}
.land-date {
  font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 4px;
  color: var(--gold); margin-top: 1.2rem; text-transform: uppercase;
}
.land-rule {
  width: 140px; height: 1px; margin: 1.2rem auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.open-btn {
  position: relative; margin-top: 1.8rem; padding: 0.9rem 3rem;
  border: 1.5px solid var(--gold); background: transparent;
  font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 5px;
  text-transform: uppercase; color: var(--purple-deep); cursor: pointer; overflow: hidden;
  transition: color 0.4s;
}
.open-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--purple-deep), var(--purple-mid));
  transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease;
}
.open-btn:hover { color: var(--cream); }
.open-btn:hover::before { transform: scaleX(1); }
.open-btn span { position: relative; z-index: 1; }

/* ===== INVITATION ===== */
#invitation {
  display: none; opacity: 0;
  transition: opacity 1.2s ease 0.4s;
  position: relative;
  background: var(--bg-paper);
}
#invitation.show { display: block; }
#invitation.visible { opacity: 1; }

/* Page watercolor bg */
.page-wc {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.page-wc .pwb {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.1;
}
.page-wc .pwb1 { width: 600px; height: 500px; background: #9b6fd0; top: 0; left: -150px; }
.page-wc .pwb2 { width: 500px; height: 450px; background: #6b3fa0; top: 200px; right: -100px; opacity: 0.07; }
.page-wc .pwb3 { width: 550px; height: 400px; background: #b8d0f0; bottom: 300px; left: -100px; opacity: 0.08; }
.page-wc .pwb4 { width: 400px; height: 350px; background: #e0c0e8; bottom: 0; right: -80px; opacity: 0.1; }

/* Main Wrapper fixed for mobile horizontal side scrolling */
.inv-wrap { position: relative; z-index: 1; overflow-x: hidden; }

/* HEADER */
.inv-header {
  text-align: center; padding: 4.5rem 2rem 3.5rem;
  position: relative;
}
.inv-header::after {
  content: ''; display: block; width: 180px; height: 1.5px;
  margin: 2rem auto 0;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* Top floral strip */
.header-floral {
  position: absolute; top: 0; left: 0; right: 0; height: 130px;
  pointer-events: none; overflow: hidden;
}

.hdr-tag {
  font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 7px;
  color: var(--purple-light); text-transform: uppercase; margin-bottom: 1.5rem;
  opacity: 0; animation: fadeUp 0.8s ease 0.1s both;
}
.hdr-names {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(3.5rem, 10vw, 7rem);
  color: var(--purple-deep); line-height: 1;
  opacity: 0; animation: fadeUp 0.9s ease 0.3s both;
}
.hdr-amp {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: var(--gold); display: block;
}
.hdr-sub {
  font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 5px;
  color: #7a5a8a; text-transform: uppercase; margin-top: 1.4rem;
  opacity: 0; animation: fadeUp 0.9s ease 0.5s both;
}

/* PHOTO */
.photo-section {
  display: flex; justify-content: center;
  padding: 2rem 2rem 3rem;
}
.photo-wrap {
  position: relative;
  width: min(360px, 88vw);
}
.photo-wrap::before {
  content: ''; position: absolute;
  inset: -12px; border: 1.5px solid var(--gold-dim);
  pointer-events: none;
}
.photo-wrap::after {
  content: ''; position: absolute;
  inset: -6px; border: 0.5px solid rgba(184,150,106,0.2);
  pointer-events: none;
}
.corner-gem {
  position: absolute; width: 18px; height: 18px; z-index: 2;
}
.corner-gem::before, .corner-gem::after {
  content: ''; position: absolute; background: var(--gold);
}
.corner-gem::before { width: 100%; height: 2px; top: 0; left: 0; }
.corner-gem::after { width: 2px; height: 100%; top: 0; left: 0; }
.corner-gem.tl { top: -13px; left: -13px; }
.corner-gem.tr { top: -13px; right: -13px; transform: scaleX(-1); }
.corner-gem.bl { bottom: -13px; left: -13px; transform: scaleY(-1); }
.corner-gem.br { bottom: -13px; right: -13px; transform: scale(-1); }
.photo-wrap img {
  width: 100%; display: block;
  filter: sepia(4%) contrast(1.02) brightness(1.02);
  border-radius: 2px;
}

/* ===== FAMILY DETAILS SECTION ===== */
.family-wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 1rem 1.5rem 2rem;
}
.family-card {
  position: relative;
  padding: 2.5rem 1.5rem;
  border: 1px solid var(--gold-dim);
  background: linear-gradient(150deg, rgba(155,111,208,0.02), rgba(107,63,160,0.04) 60%, rgba(184,150,106,0.02));
  text-align: center;
}
.family-card::before {
  content: ''; position: absolute; inset: 5px;
  border: 0.5px solid rgba(184,150,106,0.12); pointer-events: none;
}
.family-main-title {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 2.5rem;
  margin-right: -5px; /* FIXED: offsets letter-spacing to ensure absolute center alignment */
  display: inline-block;
  width: 100%;
}
.family-grid {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 2rem;
  position: relative;
}
/* Center dividing line */
.family-grid::after {
  content: '';
  position: absolute;
  top: 10%; bottom: 10%; left: 50%;
  width: 1px;
  background: linear-gradient(transparent, var(--gold-dim), transparent);
  transform: translateX(-50%);
}
.family-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}
.fam-side-title {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--purple-light);
  text-transform: uppercase;
  margin-bottom: 1rem;
  margin-right: -3px; /* FIXED: offsets side letter-spacing */
}
.fam-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  font-weight: 500;
  color: var(--purple-deep);
  line-height: 1.5;
  text-align: center;
}
.fam-relation {
  font-size: 0.8rem;
  font-style: italic;
  color: #8a7a9a;
  margin-top: 0.4rem;
  margin-bottom: 0.1rem;
  text-align: center;
}
.fam-place {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--gold);
  text-transform: uppercase;
  margin-top: 0.8rem;
  margin-right: -2px; /* FIXED: offsets place letter-spacing */
  text-align: center;
}

/* ORNAMENTAL DIVIDERS */
.ornament {
  text-align: center; padding: 0.5rem 0 1.5rem;
  color: var(--gold); font-size: 0.85rem; letter-spacing: 10px; opacity: 0.7;
}

/* EVENTS */
.events-wrap {
  max-width: 640px; margin: 0 auto; padding: 1rem 1.5rem 2rem;
}
.section-head {
  text-align: center; margin-bottom: 2rem;
}
.section-head h2 {
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 7px;
  color: var(--purple-light); text-transform: uppercase; font-weight: 400;
}

.event-card {
  position: relative; text-align: center;
  padding: 2.2rem 2rem 2rem; margin-bottom: 1.5rem;
  border: 1px solid var(--gold-dim);
  background: linear-gradient(150deg, rgba(155,111,208,0.04), rgba(107,63,160,0.06) 60%, rgba(184,150,106,0.04));
}
.event-card::before {
  content: ''; position: absolute; inset: 5px;
  border: 0.5px solid rgba(184,150,106,0.15); pointer-events: none;
}
/* corner dots */
.event-card::after {
  content: '';
  position: absolute; top: -3px; left: -3px;
  width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
  box-shadow: calc(100% + 288px) 0 0 var(--gold), 0 calc(100% + 288px) 0 var(--gold), calc(100% + 288px) calc(100% + 288px) 0 var(--gold);
}
.ev-tag {
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 6px;
  color: var(--gold); text-transform: uppercase; margin-bottom: 0.7rem;
}
.ev-time {
  font-family: 'Great Vibes', cursive; font-size: 2.8rem;
  color: var(--purple-deep); line-height: 1; margin-bottom: 0.4rem;
}
.ev-date {
  font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 3px;
  color: var(--purple-mid); text-transform: uppercase; margin-bottom: 0.6rem;
}
.ev-dots { color: var(--gold-dim); letter-spacing: 6px; font-size: 1rem; margin: 0.5rem 0; }
.ev-venue {
  font-size: 1.1rem; color: #6a4880; font-style: italic; letter-spacing: 0.5px;
}

/* COUNTDOWN */
.countdown-section {
  text-align: center; padding: 2.5rem 1.5rem 3rem;
  position: relative;
  background: linear-gradient(180deg, transparent, rgba(107,63,160,0.04), transparent);
}
.cd-label {
  font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 6px;
  color: var(--purple-light); text-transform: uppercase; margin-bottom: 2rem;
}
.cd-title {
  font-family: 'Great Vibes', cursive; font-size: 1.8rem;
  color: var(--purple-deep); margin-bottom: 0.3rem;
}
.cd-subtitle { font-size: 0.8rem; color: #9a7aaa; margin-bottom: 2.5rem; letter-spacing: 1px; }
.cd-grid {
  display: flex; justify-content: center; align-items: flex-start;
  gap: clamp(0.5rem, 3vw, 2rem);
}
.cd-unit { text-align: center; min-width: 60px; }
.cd-num {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: clamp(2.2rem, 8vw, 3.8rem); font-weight: 500;
  color: var(--purple-deep); line-height: 1;
  position: relative; padding: 0.6rem 0.8rem;
  border: 1px solid var(--gold-dim);
  background: linear-gradient(135deg, rgba(155,111,208,0.06), rgba(184,150,106,0.04));
  min-width: 70px;
}
.cd-lbl {
  font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase; margin-top: 0.5rem;
}
.cd-sep {
  font-family: 'Cinzel', serif; font-size: clamp(1.5rem, 5vw, 2.5rem);
  color: var(--gold-dim); padding-top: 0.8rem; line-height: 1;
  font-weight: 300;
}

/* VENUE */
.venue-section {
  max-width: 520px; margin: 0 auto;
  text-align: center; padding: 1rem 1.5rem 2.5rem;
}
.venue-tag {
  font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 7px;
  color: var(--purple-light); text-transform: uppercase; margin-bottom: 1.5rem;
}
.venue-name {
  font-family: 'Great Vibes', cursive; font-size: 3rem;
  color: var(--purple-deep); margin-bottom: 0.3rem;
}
.venue-place {
  font-size: 0.9rem; color: #8a6a9a; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 2.5rem;
}
.venue-box {
  border: 1px solid var(--gold-dim); padding: 2rem;
  background: linear-gradient(150deg, rgba(155,111,208,0.03), rgba(184,150,106,0.04));
  display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
}
.qr-svg { width: 150px; height: 150px; }
.qr-note {
  font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 3px;
  color: #a08090; text-transform: uppercase;
